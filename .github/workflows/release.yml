# Build the sdist + wheel and publish them to PyPI on a version tag.
#
# Triggered ONLY by pushing a tag like `v0.0.1`, so it stays dormant until a real release.
# Auth is PyPI Trusted Publishing (OIDC) — no stored token. Before the first publish a matching
# "pending publisher" must be configured on PyPI for this repo + this workflow (`release.yml`) +
# the `pypi` environment (one-time setup; see the I12c publish steps).
#
# Every action is pinned to a commit SHA (Dependabot bumps them): a job that mints the OIDC token
# and uploads to the immutable index must not run mutable action refs.
name: Release

on:
  push:
    tags:
      - "v*"

# Restrictive default for the whole workflow; any job that omits its own block inherits this.
permissions:
  contents: read

# Serialize all releases (one static group) so two tag pushes can't race the immutable PyPI upload;
# never cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aeview
    permissions:
      contents: read # job-level perms fully replace the workflow default, so re-grant checkout read
      id-token: write # OIDC for Trusted Publishing; scoped to this job only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # python-version sets UV_PYTHON=3.14; uv auto-downloads it on first use (the version read + build).
      - name: Install uv + Python 3.14
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Read [project].version with a TOML parser on uv's managed Python (no project sync).
          pkg="$(uv run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg"
            exit 1
          fi
      - name: Build sdist + wheel
        run: uv build
      - name: Validate the artifacts before the immutable upload
        run: uvx twine check --strict dist/*
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
